name: Deploy Production

on:
  push:
    tags: ['v*']

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-kratos

      - run: pnpm build

      - name: Run tests
        run: |
          pnpm --filter @kratos/core test
          pnpm --filter @kratos/db test
          pnpm --filter @kratos/ai test
          pnpm --filter @kratos/api test
          pnpm --filter @kratos/web test
        env:
          NODE_ENV: test

  deploy-web:
    name: Deploy Web (Vercel Production)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  deploy-api:
    name: Deploy API (Railway Production)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to Railway
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}

  deploy-trigger:
    name: Deploy Trigger.dev Tasks (Production)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-kratos

      - name: Deploy Trigger.dev tasks
        run: pnpm exec trigger-cli deploy
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_PRODUCTION_ACCESS_TOKEN }}
